    <!-- macOS Buttons -->
    <circle cx="24" cy="21" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="21" r="6" fill="#FEBC2E"/>
    <circle cx="64" cy="21" r="6" fill="#28C840"/>

    <!-- Title -->
    <text
      x="305"
      y="26"
      text-anchor="middle"
      fill="#94A3B8"
      font-size="13"
      font-family="monospace">
      ~/developer-profile
    </text>

    <!-- Prompt -->
    <text
      x="28"
      y="78"
      fill="#10B981"
      font-size="16"
      font-family="monospace">
      $
    </text>

    <!-- Greeting -->
    <text
      x="48"
      y="78"
      fill="#F8FAFC"
      font-size="16"
      font-family="monospace">

      Hi 👋 I'm

    </text>

    <!-- NAME -->
    <text
      x="150"
      y="78"
      fill="url(#accent)"
      filter="url(#glow)"
      font-size="18"
      font-weight="700"
      font-family="monospace">

      YOUR_NAME

    </text>

    <!-- Cursor -->
    <rect
      x="265"
      y="64"
      width="8"
      height="18"
      fill="#22D3EE">

      <animate
        attributeName="opacity"
        values="1;0;1"
        dur=".8s"
        repeatCount="indefinite"/>

    </rect>

    <!-- Divider -->
    <line
      x1="28"
      y1="96"
      x2="585"
      y2="96"
      stroke="rgba(255,255,255,.06)"/>

    <!-- ========================= -->
    <!-- Typing Section -->
    <!-- ========================= -->

    <text
      x="28"
      y="135"
      fill="#22D3EE"
      font-size="15"
      font-family="monospace">

      >

    </text>

    <!-- Role 1 -->
    <text
      x="48"
      y="135"
      fill="#F8FAFC"
      font-size="15"
      font-family="monospace">

      Frontend Engineer

      <animate
        attributeName="opacity"
        values="1;1;0;0"
        keyTimes="0;0.40;0.45;1"
        dur="12s"
        repeatCount="indefinite"/>

    </text>

    <!-- Role 2 -->

    <text
      x="48"
      y="135"
      opacity="0"
      fill="#F8FAFC"
      font-size="15"
      font-family="monospace">

      Full Stack Developer

      <animate
        attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.30;0.35;0.70;1"
        dur="12s"
        repeatCount="indefinite"/>

    </text>

    <!-- Role 3 -->

    <text
      x="48"
      y="135"
      opacity="0"
      fill="#F8FAFC"
      font-size="15"
      font-family="monospace">

      Open Source Contributor

      <animate
        attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.60;0.65;0.95;1"
        dur="12s"
        repeatCount="indefinite"/>

    </text>

    <!-- Typing Cursor -->

    <rect
      x="305"
      y="122"
      width="8"
      height="16"
      fill="#22D3EE">

      <animate
        attributeName="opacity"
        values="1;0;1"
        dur=".75s"
        repeatCount="indefinite"/>

    </rect>

  </g>

</g>

