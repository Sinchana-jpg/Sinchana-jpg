<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bgGlow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>

    <!-- Linear Accents -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <!-- Glassmorphism Shimmer -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap');
      .txt-main { font-family: 'Inter', sans-serif; fill: #F8FAFC; }
      .txt-muted { font-family: 'Inter', sans-serif; fill: #94A3B8; }
      .txt-mono { font-family: 'JetBrains Mono', monospace; fill: #F8FAFC; }
      .txt-accent { font-family: 'JetBrains Mono', monospace; fill: url(#accentGrad); font-weight: 700; }
      
      .pill { fill: #0F172A; stroke: rgba(255,255,255,0.08); stroke-width: 1; transition: all 0.3s; }
      .pill:hover { fill: #1E293B; stroke: url(#accentGrad); filter: url(#subtleGlow); }
      
      .icon-btn { fill: #94A3B8; cursor: pointer; transition: transform 0.2s, fill 0.2s; }
      .icon-btn:hover { fill: #22D3EE; transform: scale(1.1); }
    </style>
  </defs>

  <!-- Base Canvas -->
  <rect width="1180" height="610" rx="24" fill="#030712" />
  
  <!-- Ambient Background Glows -->
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow1)" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow2)" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow3)" />

  <!-- Noise Overlay / Texture Simulation -->
  <mesh width="1180" height="610" opacity="0.02" type="bfturbulence" baseFrequency="0.8" numOctaves="3" />

  <!-- Animated Particles -->
  <g opacity="0.6">
    <circle cx="150" cy="450" r="2" fill="#7C3AED"><animate attributeName="cy" values="450;400;450" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="200" r="1.5" fill="#22D3EE"><animate attributeName="cy" values="200;250;200" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="150" r="2" fill="#10B981"><animate attributeName="cx" values="850;890;850" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="500" r="1" fill="#7C3AED"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Main Container / Glass Frame -->
  <rect x="30" y="30" width="1120" height="550" rx="16" fill="#0F172A" fill-opacity="0.4" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Moving Scanline Effect -->
  <line x1="30" y1="30" x2="1150" y2="30" stroke="rgba(34, 211, 238, 0.05)" stroke-width="2">
    <animate attributeName="y1" values="30;580;30" dur="10s" repeatCount="indefinite" />
    <animate attributeName="y2" values="30;580;30" dur="10s" repeatCount="indefinite" />
  </line>

  <!-- Glass Reflection Sheen -->
  <path d="M 30 30 L 700 30 L 500 580 L 30 580 Z" fill="url(#borderGrad)" opacity="0.03" pointer-events="none"/>

  <!-- ==================== LEFT PANEL: PORTRAIT ==================== -->
  <!-- ==================== LEFT PANEL: PORTRAIT (BITIMAGE MATRIX) ==================== -->
  <g id="left-panel">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="5s" repeatCount="indefinite" easing="ease-in-out"/>
    
    <!-- Portrait Cyber Frame Border -->
    <rect x="65" y="65" width="380" height="480" rx="12" fill="#0F172A" fill-opacity="0.7" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    
    <!-- Bitimage Pixel Grid Representation -->
    <g fill="url(#asciiGrad)" opacity="0.9" filter="url(#subtleGlow)">
      <mask id="bitimageMask">
        <rect x="65" y="65" width="380" height="480" fill="#ffffff">
          <animate attributeName="height" values="0;480" dur="2s" fill="freeze" />
        </rect>
      </mask>
      
      <g mask="url(#bitimageMask)">
        <!-- Scaled Bit-Blocks simulating high-density facial outline and shadows -->
        <!-- Hair/Head silhouette blocks -->
        <rect x="200" y="90" width="80" height="12" />
        <rect x="180" y="102" width="120" height="16" />
        <rect x="160" y="118" width="150" height="20" />
        <!-- Face structures -->
        <rect x="170" y="138" width="30" height="80" />
        <rect x="200" y="138" width="80" height="90" fill-opacity="0.3" /> <!-- Highlights -->
        <rect x="280" y="138" width="35" height="80" />
        <!-- Eyes & Features (Negative spacing creates the look) -->
        <rect x="190" y="155" width="25" height="6" />
        <rect x="245" y="155" width="25" height="6" />
        <rect x="220" y="175" width="20" height="8" />
        <rect x="210" y="195" width="40" height="6" />
        <!-- Jaw & Neck -->
        <rect x="180" y="218" width="110" height="15" />
        <rect x="200" y="233" width="70" height="25" />
        <!-- Collar & Torso Outer Matrix Layout -->
        <rect x="150" y="258" width="170" height="15" />
        <rect x="120" y="273" width="230" height="20" />
        <rect x="100" y="293" width="270" height="40" />
        <rect x="90" y="333" width="290" height="60" />
        <!-- Crossed Arms Horizontal Bit Rows -->
        <rect x="110" y="393" width="250" height="15" />
        <rect x="120" y="408" width="230" height="12" />
        <rect x="115" y="420" width="240" height="18" />
        <rect x="130" y="438" width="210" height="15" />
        <!-- Watch accents -->
        <rect x="175" y="412" width="25" height="20" fill="#22D3EE" />
      </g>
    </g>

    <!-- Scanline Overlay on Portrait Box -->
    <rect x="65" y="65" width="380" height="480" fill="url(#bgGlow2)" opacity="0.05" pointer-events="none"/>
    
    <!-- Matrix Terminal State Indicator -->
    <text x="80" y="530" class="txt-mono" font-size="12" fill="#22D3EE" opacity="0.7">MATRIX_NODE://
      <tspan fill="#F8FAFC">RENDER_OK</tspan>
      <tspan fill="#22D3EE">_</tspan>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite" />
    </text>
  </g>
    <!-- Scanline Overlay on Portrait Box -->
    <rect x="65" y="65" width="380" height="480" fill="url(#bgGlow2)" opacity="0.05" pointer-events="none"/>
    
    <!-- Matrix/Cyber Blink Cursor on Left Frame Bottom -->
    <text x="80" y="530" class="txt-mono" font-size="12" fill="#22D3EE" opacity="0.7">SECURE_NODE://
      <tspan fill="#F8FAFC">ONLINE</tspan>
      <tspan fill="#22D3EE">_</tspan>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- ==================== RIGHT PANEL: TERMINAL ==================== -->
  <g id="right-panel" transform="translate(490, 65)">
    <!-- Header Greeting Area -->
    <text x="0" y="30" class="txt-muted" font-size="18" font-weight="500" letter-spacing="1">GREETINGS_</text>
    <text x="0" y="70" class="txt-main" font-size="46" font-weight="700" letter-spacing="-0.5">Hi, I'm <tspan fill="url(#accentGrad)">Sinchana</tspan><tspan fill="#22D3EE">.</tspan></text>

    <!-- Multi-phrase Dynamic Typing Text -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" class="txt-mono" font-size="22" font-weight="500" fill="#22D3EE">
        <tspan>&gt; </tspan>
        <tspan fill="#F8FAFC">
          <animate attributeName="visibility" values="visible;hidden;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.3 fill="freeze"" />
          Open Source Contributor
        </tspan>
        <tspan fill="#F8FAFC">
          <animate attributeName="visibility" values="hidden;visible;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.35;0.65;1" />
          Full Stack Developer
        </tspan>
        <tspan fill="#F8FAFC">
          <animate attributeName="visibility" values="hidden;hidden;visible;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.68;0.95;1" />
          CS Engineer
        </tspan>
        <tspan fill="#22D3EE">_
          <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
        </tspan>
      </text>
    </g>

    <!-- Detailed Profile Core Specs / Sequential Fade-in -->
    <g transform="translate(0, 160)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.8s" fill="freeze" />
      
      <!-- Specification Fields -->
      <text x="0" y="20" class="txt-mono" font-size="14" fill="#7C3AED">🚀 STATUS:</text>
      <text x="120" y="20" class="txt-main" font-size="15" font-weight="400">Engineering Student &amp; Tech Explorer</text>

      <text x="0" y="50" class="txt-mono" font-size="14" fill="#22D3EE">📍 LOCATION:</text>
      <text x="120" y="50" class="txt-main" font-size="15" font-weight="400">Karnataka, India</text>

      <text x="0" y="80" class="txt-mono" font-size="14" fill="#10B981">🧠 FOCUS:</text>
      <text x="120" y="80" class="txt-main" font-size="15" font-weight="400">Cloud Architectures, Modern Web &amp; Systems Optimization</text>

      <text x="0" y="110" class="txt-mono" font-size="14" fill="#7C3AED">🔗 GITHUB:</text>
      <text x="120" y="110" class="txt-mono" font-size="15" fill="#94A3B8">github.com/<tspan fill="#F8FAFC" font-weight="500">Sinchana-jpg</tspan></text>
    </g>

    <!-- ==================== SKILLS SEGMENT ==================== -->
    <g transform="translate(0, 310)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.8s" fill="freeze" />
      <text x="0" y="0" class="txt-muted" font-size="13" font-weight="600" letter-spacing="1.5">STACK &amp; EXPERTISE</text>
      
      <!-- Row 1 Tech Pills -->
      <g transform="translate(0, 18)">
        <g transform="translate(0,0)"><rect class="pill" width="76" height="32" rx="8"/><text x="38" y="20" class="txt-mono" font-size="13" text-anchor="middle">React</text></g>
        <g transform="translate(86,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="txt-mono" font-size="13" text-anchor="middle">Next.js</text></g>
        <g transform="translate(186,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="txt-mono" font-size="13" text-anchor="middle">Node.js</text></g>
        <g transform="translate(286,0)"><rect class="pill" width="112" height="32" rx="8"/><text x="56" y="20" class="txt-mono" font-size="13" text-anchor="middle">TypeScript</text></g>
        <g transform="translate(408,0)"><rect class="pill" width="96" height="32" rx="8"/><text x="48" y="20" class="txt-mono" font-size="13" text-anchor="middle">Tailwind</text></g>
        <g transform="translate(514,0)"><rect class="pill" width="86" height="32" rx="8"/><text x="43" y="20" class="txt-mono" font-size="13" text-anchor="middle">Python</text></g>
      </g>

      <!-- Row 2 Tech Pills -->
      <g transform="translate(0, 62)">
        <g transform="translate(0,0)"><rect class="pill" width="84" height="32" rx="8"/><text x="42" y="20" class="txt-mono" font-size="13" text-anchor="middle">Docker</text></g>
        <g transform="translate(94,0)"><rect class="pill" width="102" height="32" rx="8"/><text x="51" y="20" class="txt-mono" font-size="13" text-anchor="middle">Postgres</text></g>
        <g transform="translate(206,0)"><rect class="pill" width="68" height="32" rx="8"/><text x="34" y="20" class="txt-mono" font-size="13" text-anchor="middle">AWS</text></g>
        <g transform="translate(284,0)"><rect class="pill" width="64" height="32" rx="8"/><text x="32" y="20" class="txt-mono" font-size="13" text-anchor="middle">Git</text></g>
        <g transform="translate(358,0)"><rect class="pill" width="78" height="32" rx="8"/><text x="39" y="20" class="txt-mono" font-size="13" text-anchor="middle">Figma</text></g>
      </g>
    </g>

    <!-- ==================== SOCIAL / FOOTER ELEMENT ==================== -->
    <g transform="translate(0, 455)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.8s" fill="freeze" />
      
      <!-- Separator Line -->
      <line x1="0" y1="0" x2="620" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      
      <!-- Interactive Social Vector Path Elements -->
      <g transform="translate(0, 18)">
        <!-- GitHub Icon -->
        <path class="icon-btn" d="M0,0 M12,2A10,10 0 0,0 8.84,21.5C9.34,21.58 9.53,21.28 9.53,21.03C9.53,20.8 9.52,20.19 9.52,19.37C6.74,19.97 6.15,18.03 6.15,18.03C5.7,16.87 5.05,16.56 5.05,16.56C4.14,15.94 5.12,15.95 5.12,15.95C6.13,16.02 6.66,16.99 6.66,16.99C7.55,18.5 8.98,18.07 9.54,17.82C9.63,17.17 9.89,16.73 10.18,16.48C7.96,16.23 5.62,15.37 5.62,11.53C5.62,10.43 6,9.54 6.63,8.84C6.52,8.59 6.18,7.56 6.72,6.17C6.72,6.17 7.56,5.9 9.47,7.19A9.95,9.95 0 0,1 12,6.84C12.85,6.84 13.71,6.96 14.53,7.19C16.44,5.9 17.28,6.17 17.28,6.17C17.82,7.56 17.48,8.59 17.37,8.84C18,9.54 18.38,10.43 18.38,11.53C18.38,15.38 16.04,16.22 13.81,16.47C14.17,16.78 14.49,17.4 14.49,18.35C14.49,19.71 14.48,20.81 14.48,21.03C14.48,21.28 14.67,21.59 15.18,21.49A10,10 0 0,0 12,2Z" transform="scale(1.2)" />
        
        <!-- LinkedIn Icon -->
        <path class="icon-btn" d="M19,3a2,2,0,0,1,2,2V19a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V5A2,2,0,0,1,5,3H19M18.5,18.5V13.2A3.26,3.26,0,0,0,15.24,9.94,3.13,3.13,0,0,0,12.4,11.4V10.1H9.5V18.5H12.4V13.8a1.4,1.4,0,0,1,1.4-1.4,1.4,1.4,0,0,1,1.4,1.4v4.7h2.9M6.88,8.56A1.68,1.68,0,0,0,8.56,6.88,1.68,1.68,0,0,0,6.88,5.2,1.68,1.68,0,0,0,5.2,6.88,1.68,1.68,0,0,0,6.88,8.56M8.34,18.5V10.1H5.42v8.4H8.34Z" transform="translate(42, -2) scale(1.1)" />
        
        <!-- Twitter/X Icon -->
        <path class="icon-btn" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" transform="translate(82, 0) scale(0.95)" />
        
        <!-- Portfolio/Link Icon -->
        <path class="icon-btn" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z" transform="translate(120, -1) scale(1.1)" />
      </g>

      <!-- Connection/Ping Signal status display -->
      <g transform="translate(515, 20)">
        <circle cx="0" cy="0" r="4" fill="#10B981" filter="url(#subtleGlow)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="12" y="4" class="txt-mono" font-size="11" fill="#94A3B8">SYSTEMS_SECURE</text>
      </g>
    </g>
  </g>
</svg>
