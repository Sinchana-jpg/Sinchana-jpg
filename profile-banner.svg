<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Dynamic Accent Gradient (Universal Animation) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Global Visual Filters -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Unified Stylesheet with Media Query Theme Injection -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap');
      
      /* Base Styles &amp; Typography */
      .txt-main { font-family: 'Inter', sans-serif; transition: fill 0.3s; }
      .txt-muted { font-family: 'Inter', sans-serif; transition: fill 0.3s; }
      .txt-mono { font-family: 'JetBrains Mono', monospace; transition: fill 0.3s; }
      .pill-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; text-anchor: middle; transition: fill 0.3s; }
      .pill { stroke-width: 1; transition: fill 0.3s, stroke 0.3s; }
      .icon-btn { cursor: pointer; transition: transform 0.2s, fill 0.2s; }
      .icon-btn:hover { transform: scale(1.1); }

      /* Default: DARK MODE configuration */
      :root {
        --bg-main: #030712;
        --panel-bg: #0F172A;
        --border-color: rgba(255, 255, 255, 0.08);
        --text-primary: #F8FAFC;
        --text-secondary: #94A3B8;
        --ascii-start: #22D3EE;
        --ascii-end: #7C3AED;
        --glow-1: rgba(124, 58, 237, 0.15);
        --glow-2: rgba(34, 211, 238, 0.12);
        --glow-3: rgba(16, 185, 129, 0.08);
        --pill-bg: #0F172A;
        --pill-hover: #1E293B;
        --scanline-color: rgba(34, 211, 238, 0.05);
      }

      /* Native Light Theme Adaption */
      @media (prefers-color-scheme: light) {
        :root {
          --bg-main: #FFFFFF;
          --panel-bg: #F8FAFC;
          --border-color: rgba(15, 23, 42, 0.08);
          --text-primary: #0F172A;
          --text-secondary: #475569;
          --ascii-start: #2563EB;
          --ascii-end: #06B6D4;
          --glow-1: rgba(37, 99, 235, 0.06);
          --glow-2: rgba(6, 182, 212, 0.05);
          --glow-3: rgba(16, 185, 129, 0.04);
          --pill-bg: #F8FAFC;
          --pill-hover: #FFFFFF;
          --scanline-color: rgba(37, 99, 235, 0.03);
        }
      }

      /* Variable assignments applied to DOM */
      .bg-canvas { fill: var(--bg-main); transition: fill 0.3s; }
      .frame-bg { fill: var(--panel-bg); stroke: var(--border-color); fill-opacity: 0.5; transition: fill 0.3s, stroke 0.3s; }
      .portrait-box { fill: var(--panel-bg); stroke: var(--border-color); fill-opacity: 0.7; transition: fill 0.3s, stroke 0.3s; }
      .txt-main { fill: var(--text-primary); }
      .txt-muted { fill: var(--text-secondary); }
      .txt-mono { fill: var(--text-primary); }
      .pill { fill: var(--pill-bg); stroke: var(--border-color); }
      .pill:hover { fill: var(--pill-hover); stroke: url(#accentGrad); filter: url(#subtleGlow); }
      .pill-text { fill: var(--text-primary); }
      .icon-btn { fill: var(--text-secondary); }
      .icon-btn:hover { fill: var(--ascii-start); }
    </style>

    <!-- Dynamic Theme Gradients -->
    <radialGradient id="bgGlow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="var(--glow-1)" />
      <stop offset="100%" stop-color="var(--bg-main)" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="var(--glow-2)" />
      <stop offset="100%" stop-color="var(--bg-main)" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="var(--glow-3)" />
      <stop offset="100%" stop-color="var(--bg-main)" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--ascii-start)" />
      <stop offset="100%" stop-color="var(--ascii-end)" />
    </linearGradient>
  </defs>

  <!-- Base Canvas Layout -->
  <rect width="1180" height="610" rx="24" class="bg-canvas" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow1)" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow2)" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow3)" />

  <!-- Background Noise Texture Simulation -->
  <mesh width="1180" height="610" opacity="0.015" type="bfturbulence" baseFrequency="0.8" numOctaves="3" />

  <!-- Micro-Particle System -->
  <g opacity="0.5">
    <circle cx="150" cy="450" r="2" fill="#7C3AED"><animate attributeName="cy" values="450;400;450" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="200" r="1.5" fill="#22D3EE"><animate attributeName="cy" values="200;250;200" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="150" r="2" fill="#10B981"><animate attributeName="cx" values="850;890;850" dur="7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Main Unified Glass Container Frame -->
  <rect x="30" y="30" width="1120" height="550" rx="16" class="frame-bg" stroke-width="1.5" />

  <!-- Continuous Premium Scanline Sweep -->
  <line x1="30" y1="30" x2="1150" y2="30" stroke="var(--scanline-color)" stroke-width="2">
    <animate attributeName="y1" values="30;580;30" dur="10s" repeatCount="indefinite" />
    <animate attributeName="y2" values="30;580;30" dur="10s" repeatCount="indefinite" />
  </line>

  <!-- ==================== LEFT PANEL: PORTRAIT (BITIMAGE MATRIX) ==================== -->
  <g id="left-panel">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="5s" repeatCount="indefinite" easing="ease-in-out"/>
    <rect x="65" y="65" width="380" height="480" rx="12" class="portrait-box" stroke-width="1"/>
    
    <!-- Render Structured High-Density Bitimage Matrix -->
    <g fill="url(#asciiGrad)" opacity="0.9" filter="url(#subtleGlow)">
      <mask id="matrixMask">
        <rect x="65" y="65" width="380" height="480" fill="#ffffff">
          <animate attributeName="height" values="0;480" dur="2s" fill="freeze" />
        </rect>
      </mask>
      <g mask="url(#matrixMask)">
        <!-- Silhouette Structure Blocks -->
        <rect x="200" y="90" width="80" height="12" />
        <rect x="180" y="102" width="120" height="16" />
        <rect x="160" y="118" width="150" height="20" />
        <rect x="170" y="138" width="30" height="80" />
        <rect x="200" y="138" width="80" height="90" fill-opacity="0.25" /> 
        <rect x="280" y="138" width="35" height="80" />
        <!-- Key Features Negative Spaces -->
        <rect x="190" y="155" width="25" height="6" />
        <rect x="245" y="155" width="25" height="6" />
        <rect x="220" y="175" width="20" height="8" />
        <rect x="210" y="195" width="40" height="6" />
        <!-- Lower Profile & Posture Blocks -->
        <rect x="180" y="218" width="110" height="15" />
        <rect x="200" y="233" width="70" height="25" />
        <rect x="150" y="258" width="170" height="15" />
        <rect x="120" y="273" width="230" height="20" />
        <rect x="100" y="293" width="270" height="40" />
        <rect x="90" y="333" width="290" height="60" />
        <!-- Crossed Arms Matrix Representation -->
        <rect x="110" y="393" width="250" height="15" />
        <rect x="120" y="408" width="230" height="12" />
        <rect x="115" y="420" width="240" height="18" />
        <rect x="130" y="438" width="210" height="15" />
        <!-- Technical details highlights -->
        <rect x="175" y="412" width="25" height="20" fill="url(#accentGrad)" />
      </g>
    </g>

    <!-- Active Node Status -->
    <text x="80" y="530" class="txt-mono" font-size="12" opacity="0.8">CORE_NODE://
      <tspan class="txt-main" font-weight="700">ONLINE</tspan>
      <tspan fill="var(--ascii-start)">_</tspan>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- ==================== RIGHT PANEL: DYNAMIC TERMINAL ==================== -->
  <g id="right-panel" transform="translate(490, 65)">
    <text x="0" y="30" class="txt-muted" font-size="18" font-weight="500" letter-spacing="1">GREETINGS_</text>
    <text x="0" y="70" class="txt-main" font-size="46" font-weight="700" letter-spacing="-0.5">Hi, I'm <tspan fill="url(#accentGrad)">Sinchana</tspan><tspan fill="var(--ascii-start)">.</tspan></text>

    <!-- Smooth Non-JS Text Cycler Script -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" class="txt-mono" font-size="22" font-weight="500" fill="var(--ascii-start)">
        <tspan>&gt; </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="visible;hidden;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.3" fill="freeze" />
          Open Source Contributor
        </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="hidden;visible;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.35;0.65;1" />
          Full Stack Developer
        </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="hidden;hidden;visible;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.68;0.95;1" />
          CS Engineer
        </tspan>
        <tspan fill="var(--ascii-start)">_
          <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
        </tspan>
      </text>
    </g>

    <!-- Specification Metrics Array -->
    <g transform="translate(0, 160)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze" />
      
      <text x="0" y="20" class="txt-mono" font-size="14" fill="var(--ascii-start)">🚀 STATUS:</text>
      <text x="120" y="20" class="txt-main" font-size="15">Engineering Student &amp; Tech Explorer</text>

      <text x="0" y="50" class="txt-mono" font-size="14" fill="#10B981">📍 LOCATION:</text>
      <text x="120" y="50" class="txt-main" font-size="15">Karnataka, India</text>

      <text x="0" y="80" class="txt-mono" font-size="14" fill="var(--ascii-end)">🧠 FOCUS:</text>
      <text x="120" y="80" class="txt-main" font-size="15">Cloud Architectures, Modern Web &amp; Systems Optimization</text>

      <text x="0" y="110" class="txt-mono" font-size="14" fill="var(--ascii-start)">🔗 GITHUB:</text>
      <text x="120" y="110" class="txt-mono" class="txt-muted">github.com/<tspan class="txt-main" font-weight="500">Sinchana-jpg</tspan></text>
    </g>

    <!-- Professional Tech Interactive Capability Pills -->
    <g transform="translate(0, 310)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.1s" dur="0.6s" fill="freeze" />
      <text x="0" y="0" class="txt-muted" font-size="13" font-weight="600" letter-spacing="1.5">STACK &amp; EXPERTISE</text>
      
      <!-- Primary Capability Row -->
      <g transform="translate(0, 18)">
        <g transform="translate(0,0)"><rect class="pill" width="76" height="32" rx="8"/><text x="38" y="20" class="pill-text">React</text></g>
        <g transform="translate(86,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="pill-text">Next.js</text></g>
        <g transform="translate(186,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="pill-text">Node.js</text></g>
        <g transform="translate(286,0)"><rect class="pill" width="112" height="32" rx="8"/><text x="56" y="20" class="pill-text">TypeScript</text></g>
        <g transform="translate(408,0)"><rect class="pill" width="96" height="32" rx="8"/><text x="48" y="20" class="pill-text">Tailwind</text></g>
        <g transform="translate(514,0)"><rect class="pill" width="86" height="32" rx="8"/><text x="43" y="20" class="pill-text">Python</text></g>
      </g>

      <!-- Secondary Infrastructure Row -->
      <g transform="translate(0, 62)">
        <g transform="translate(0,0)"><rect class="pill" width="84" height="32" rx="8"/><text x="42" y="20" class="pill-text">Docker</text></g>
        <g transform="translate(94,0)"><rect class="pill" width="102" height="32" rx="8"/><text x="51" y="20" class="pill-text">Postgres</text></g>
        <g transform="translate(206,0)"><rect class="pill" width="68" height="32" rx="8"/><text x="34" y="20" class="pill-text">AWS</text></g>
        <g transform="translate(284,0)"><rect class="pill" width="64" height="32" rx="8"/><text x="32" y="20" class="pill-text">Git</text></g>
        <g transform="translate(358,0)"><rect class="pill" width="78" height="32" rx="8"/><text x="39" y="20" class="pill-text">Figma</text></g>
      </g>
    </g>

    <!-- Footer Segment / Secure Link Paths -->
    <g transform="translate(0, 455)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.6s" fill="freeze" />
      <line x1="0" y1="0" x2="620" y2="0" stroke="var(--border-color)" stroke-width="1"/>
      
      <g transform="translate(0, 18)">
        <!-- GitHub Vector Icon Path -->
        <path class="icon-btn" d="M0,0 M12,2A10,10 0 0,0 8.84,21.5C9.34,21.58 9.53,21.28 9.53,21.03C9.53,20.8 9.52,20.19 9.52,19.37C6.74,19.97 6.15,18.03 6.15,18.03C5.7,16.87 5.05,16.56 5.05,16.56C4.14,15.94 5.12,15.95 5.12,15.95C6.13,16.02 6.66,16.99 6.66,16.99C7.55,18.5 8.98,18.07 9.54,17.82C9.63,17.17 9.89,16.73 10.18,16.48C7.96,16.23 5.62,15.37 5.62,11.53C5.62,10.43 6,9.54 6.63,8.84C6.52,8.59 6.18,7.56 6.72,6.17C6.72,6.17 7.56,5.9 9.47,7.19A9.95,9.95 0 0,1 12,6.84C12.85,6.84 13.71,6.96 14.53,7.19C16.44,5.9 17.28,6.17 17.28,6.17C17.82,7.56 17.48,8.59 17.37,8.84C18,9.54 18.38,10.43 18.38,11.53C18.38,15.38 16.04,16.22 13.81,16.47C14.17,16.78 14.49,17.4 14.49,18.35C14.49,19.71 14.48,20.81 14.48,21.03C14.48,21.28 14.67,21.59 15.18,21.49A10,10 0 0,0 12,2Z" transform="scale(1.2)" />
        <!-- LinkedIn Vector Icon Path -->
        <path class="icon-btn" d="M19,3a2,2,0,0,1,2,2V19a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V5A2,2,0,0,1,5,3H19M18.5,18.5V13.2A3.26,3.26,0,0,0,15.24,9.94,3.13,3.13,0,0,0,12.4,11.4V10.1H9.5V18.5H12.4V13.8a1.4,1.4,0,0,1,1.4-1.4,1.4,1.4,0,0,1,1.4,1.4v4.7h2.9M6.88,8.56A1.68,1.68,0,0,0,8.56,6.88,1.68,1.68,0,0,0,6.88,5.2,1.68,1.68,0,0,0,5.2,6.88,1.68,1.68,0,0,0,6.88,8.56M8.34,18.5V10.1H5.42v8.4H8.34Z" transform="translate(42, -2) scale(1.1)" />
        <!-- Twitter/X Vector Icon Path -->
        <path class="icon-btn" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" transform="translate(82, 0) scale(0.95)" />
        <!-- Portfolio Link Vector Icon Path -->
        <path class="icon-btn" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z" transform="translate(120, -1) scale(1.1)" />
      </g>

      <!-- Active Status Verification Ping -->
      <g transform="translate(515, 20)">
        <circle cx="0" cy="0" r="4" fill="#10B981" filter="url(#subtleGlow)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="12" y="4" class="txt-mono" font-size="11" fill="var(--text-secondary)">SYSTEMS_SECURE</text>
      </g>
    </g>
  </g>
</svg>
