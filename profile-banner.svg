<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Dynamic Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Visual Glow Filter -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Clip Path to smoothly round the profile picture corners -->
    <clipPath id="profileClip">
      <rect x="65" y="65" width="380" height="480" rx="12" />
    </clipPath>

    <!-- Professional Font Stack & Theme Mapping -->
    <style>
      .txt-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: fill 0.3s; }
      .txt-muted { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: fill 0.3s; }
      .txt-mono { font-family: ui-monospace, SFMono-Regular, SF Pro Mono, Menlo, Monaco, Consolas, monospace; transition: fill 0.3s; }
      .pill-text { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px; text-anchor: middle; transition: fill 0.3s; }
      .pill { stroke-width: 1; transition: fill 0.3s, stroke 0.3s; }
      .icon-btn { cursor: pointer; transition: transform 0.2s, fill 0.2s; }
      .icon-btn:hover { transform: scale(1.1); }

      /* ==================== DARK MODE (DEFAULT) ==================== */
      .bg-canvas { fill: #030712; }
      .frame-bg { fill: #0F172A; stroke: rgba(255, 255, 255, 0.08); fill-opacity: 0.5; }
      .portrait-box { fill: #0F172A; stroke: rgba(255, 255, 255, 0.08); fill-opacity: 0.7; }
      .txt-main { fill: #F8FAFC; }
      .txt-muted { fill: #94A3B8; }
      .txt-mono { fill: #F8FAFC; }
      .pill { fill: #0F172A; stroke: rgba(255, 255, 255, 0.08); }
      .pill:hover { fill: #1E293B; stroke: url(#accentGrad); filter: url(#subtleGlow); }
      .pill-text { fill: #F8FAFC; }
      .icon-btn { fill: #94A3B8; }
      .icon-btn:hover { fill: #22D3EE; }
      .scanline { stroke: rgba(34, 211, 238, 0.04); }
      .node-accent { fill: #22D3EE; }
      .img-overlay { fill: url(#accentGrad); opacity: 0.15; mix-blend-mode: overlay; }

      /* ==================== LIGHT MODE ==================== */
      @media (prefers-color-scheme: light) {
        .bg-canvas { fill: #FFFFFF; }
        .frame-bg { fill: #F8FAFC; stroke: rgba(15, 23, 42, 0.08); fill-opacity: 0.5; }
        .portrait-box { fill: #F8FAFC; stroke: rgba(15, 23, 42, 0.08); fill-opacity: 0.7; }
        .txt-main { fill: #0F172A; }
        .txt-muted { fill: #475569; }
        .txt-mono { fill: #0F172A; }
        .pill { fill: #F8FAFC; stroke: rgba(15, 23, 42, 0.08); }
        .pill:hover { fill: #FFFFFF; stroke: url(#accentGrad); filter: url(#subtleGlow); }
        .pill-text { fill: #0F172A; }
        .icon-btn { fill: #475569; }
        .icon-btn:hover { fill: #2563EB; }
        .scanline { stroke: rgba(37, 99, 235, 0.03); }
        .node-accent { fill: #2563EB; }
        .img-overlay { fill: #2563EB; opacity: 0.08; mix-blend-mode: multiply; }
      }
    </style>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Canvas Layout -->
  <rect width="1180" height="610" rx="24" class="bg-canvas" />
  <rect width="1180" height="610" rx="24" fill="url(#bgGlow)" />

  <!-- Background Noise Texture -->
  <mesh width="1180" height="610" opacity="0.01" type="bfturbulence" baseFrequency="0.9" numOctaves="2" />

  <!-- Main Unified Glass Container Frame -->
  <rect x="30" y="30" width="1120" height="550" rx="16" class="frame-bg" stroke-width="1.5" />

  <!-- Continuous Premium Scanline Sweep -->
  <line x1="30" y1="30" x2="1150" y2="30" class="scanline" stroke-width="2">
    <animate attributeName="y1" values="30;580;30" dur="10s" repeatCount="indefinite" />
    <animate attributeName="y2" values="30;580;30" dur="10s" repeatCount="indefinite" />
  </line>

  <!-- ==================== LEFT PANEL: IMAGE PORTRAIT ==================== -->
  <g id="left-panel">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="5s" repeatCount="indefinite" easing="ease-in-out"/>
    
    <!-- Portrait Box Base -->
    <rect x="65" y="65" width="380" height="480" rx="12" class="portrait-box" stroke-width="1"/>
    
    <!-- Render Image with Clip Path -->
    <g clip-path="url(#profileClip)">
      <image href="https://github.com/Sinchana-jpg/portfolio/blob/main/profile.jpg?raw=true" x="65" y="65" width="380" height="480" preserveAspectRatio="xMidYMid slice" />
      
      <!-- Premium Cyber Tone Filter Over the Image -->
      <rect x="65" y="65" width="380" height="480" class="img-overlay" />
      
      <!-- Subtle Tech Scanlines specifically on the image to bind it into the UI -->
      <g opacity="0.15" stroke="#FFF" stroke-width="1">
        <line x1="65" y1="100" x2="445" y2="100" /><line x1="65" y1="140" x2="445" y2="140" />
        <line x1="65" y1="180" x2="445" y2="180" /><line x1="65" y1="220" x2="445" y2="220" />
        <line x1="65" y1="260" x2="445" y2="260" /><line x1="65" y1="300" x2="445" y2="300" />
        <line x1="65" y1="340" x2="445" y2="340" /><line x1="65" y1="380" x2="445" y2="380" />
        <line x1="65" y1="420" x2="445" y2="420" /><line x1="65" y1="460" x2="445" y2="460" />
      </g>
    </g>

    <!-- Re-render border on top of clipped image for crisp lines -->
    <rect x="65" y="65" width="380" height="480" rx="12" fill="none" class="portrait-box" stroke-width="1.5"/>

    <!-- Active Node Status -->
    <text x="80" y="530" class="txt-mono" font-size="12" opacity="0.9">SYS_IMG://
      <tspan class="txt-main" font-weight="700">RENDERED</tspan>
      <tspan class="node-accent">_</tspan>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- ==================== RIGHT PANEL: DYNAMIC TERMINAL ==================== -->
  <g id="right-panel" transform="translate(490, 65)">
    <text x="0" y="30" class="txt-muted" font-size="18" font-weight="500" letter-spacing="1">GREETINGS_</text>
    <text x="0" y="70" class="txt-main" font-size="46" font-weight="700" letter-spacing="-0.5">Hi, I'm <tspan fill="url(#accentGrad)">Sinchana</tspan><tspan class="node-accent">.</tspan></text>

    <!-- Smooth Non-JS Text Cycler Script -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" class="txt-mono" font-size="22" font-weight="500" class="node-accent">
        <tspan>&gt; </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="visible;hidden;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.3" fill="freeze" />
          Open Source Contributor
        </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="hidden;visible;hidden;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.35;0.65;1" />
          Full Stack Developer
        </tspan>
        <tspan class="txt-main">
          <animate attributeName="visibility" values="hidden;hidden;visible;hidden" dur="12s" repeatCount="indefinite" keyTimes="0;0.68;0.95;1" />
          CS Engineer
        </tspan>
        <tspan class="node-accent">_
          <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
        </tspan>
      </text>
    </g>

    <!-- Specification Metrics Array -->
    <g transform="translate(0, 160)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.5s" fill="freeze" />
      
      <text x="0" y="20" class="txt-mono" font-size="14" class="node-accent">🚀 STATUS:</text>
      <text x="120" y="20" class="txt-main" font-size="15">Engineering Student &amp; Tech Explorer</text>

      <text x="0" y="50" class="txt-mono" font-size="14" fill="#10B981">📍 LOCATION:</text>
      <text x="120" y="50" class="txt-main" font-size="15">Karnataka, India</text>

      <text x="0" y="80" class="txt-mono" font-size="14" fill="#7C3AED">🧠 FOCUS:</text>
      <text x="120" y="80" class="txt-main" font-size="15">Cloud Architectures, Modern Web &amp; Systems Optimization</text>

      <text x="0" y="110" class="txt-mono" font-size="14" class="node-accent">🔗 GITHUB:</text>
      <text x="120" y="110" class="txt-mono" class="txt-muted">github.com/<tspan class="txt-main" font-weight="500">Sinchana-jpg</tspan></text>
    </g>

    <!-- Professional Tech Interactive Capability Pills -->
    <g transform="translate(0, 310)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.9s" dur="0.5s" fill="freeze" />
      <text x="0" y="0" class="txt-muted" font-size="13" font-weight="600" letter-spacing="1.5">STACK &amp; EXPERTISE</text>
      
      <!-- Primary Capability Row -->
      <g transform="translate(0, 18)">
        <g transform="translate(0,0)"><rect class="pill" width="76" height="32" rx="8"/><text x="38" y="20" class="pill-text">React</text></g>
        <g transform="translate(86,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="pill-text">Next.js</text></g>
        <g transform="translate(186,0)"><rect class="pill" width="90" height="32" rx="8"/><text x="45" y="20" class="pill-text">Node.js</text></g>
        <g transform="translate(286,0)"><rect class="pill" width="112" height="32" rx="8"/><text x="56" y="20" class="pill-text">TypeScript</text></g>
        <g transform="translate(408,0)"><rect class="pill" width="96" height="32" rx="8"/><text x="48" y="20" class="pill-text">Tailwind</text></g>
        <g transform="translate(514,0)"><rect class="pill" width="86" height="32" rx="8"/><text x="43" y="20" class="pill-text">Python</text></g>
      </g>

      <!-- Secondary Infrastructure Row -->
      <g transform="translate(0, 62)">
        <g transform="translate(0,0)"><rect class="pill" width="84" height="32" rx="8"/><text x="42" y="20" class="pill-text">Docker</text></g>
        <g transform="translate(94,0)"><rect class="pill" width="102" height="32" rx="8"/><text x="51" y="20" class="pill-text">Postgres</text></g>
        <g transform="translate(206,0)"><rect class="pill" width="68" height="32" rx="8"/><text x="34" y="20" class="pill-text">AWS</text></g>
        <g transform="translate(284,0)"><rect class="pill" width="64" height="32" rx="8"/><text x="32" y="20" class="pill-text">Git</text></g>
        <g transform="translate(358,0)"><rect class="pill" width="78" height="32" rx="8"/><text x="39" y="20" class="pill-text">Figma</text></g>
      </g>
    </g>

    <!-- Footer Segment -->
    <g transform="translate(0, 455)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.5s" fill="freeze" />
      <line x1="0" y1="0" x2="620" y2="0" stroke="var(--border-color)" stroke-width="1"/>
      
      <g transform="translate(0, 18)">
        <!-- GitHub Vector Icon -->
        <path class="icon-btn" d="M0,0 M12,2A10,10 0 0,0 8.84,21.5C9.34,21.58 9.53,21.28 9.53,21.03C9.53,20.8 9.52,20.19 9.52,19.37C6.74,19.97 6.15,18.03 6.15,18.03C5.7,16.87 5.05,16.56 5.05,16.56C4.14,15.94 5.12,15.95 5.12,15.95C6.13,16.02 6.66,16.99 6.66,16.99C7.55,18.5 8.98,18.07 9.54,17.82C9.63,17.17 9.89,16.73 10.18,16.48C7.96,16.23 5.62,15.37 5.62,11.53C5.62,10.43 6,9.54 6.63,8.84C6.52,8.59 6.18,7.56 6.72,6.17C6.72,6.17 7.56,5.9 9.47,7.19A9.95,9.95 0 0,1 12,6.84C12.85,6.84 13.71,6.96 14.53,7.19C16.44,5.9 17.28,6.17 17.28,6.17C17.82,7.56 17.48,8.59 17.37,8.84C18,9.54 18.38,10.43 18.38,11.53C18.38,15.38 16.04,16.22 13.81,16.47C14.17,16.78 14.49,17.4 14.49,18.35C14.49,19.71 14.48,20.81 14.48,21.03C14.48,21.28 14.67,21.59 15.18,21.49A10,10 0 0,0 12,2Z" transform="scale(1.2)" />
        <!-- LinkedIn Vector Icon -->
        <path class="icon-btn" d="M19,3a2,2,0,0,1,2,2V19a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V5A2,2,0,0,1,5,3H19M18.5,18.5V13.2A3.26,3.26,0,0,0,15.24,9.94,3.13,3.13,0,0,0,12.4,11.4V10.1H9.5V18.5H12.4V13.8a1.4,1.4,0,0,1,1.4-1.4,1.4,1.4,0,0,1,1.4,1.4v4.7h2.9M6.88,8.56A1.68,1.68,0,0,0,8.56,6.88,1.68,1.68,0,0,0,6.88,5.2,1.68,1.68,0,0,0,5.2,6.88,1.68,1.68,0,0,0,6.88,8.56M8.34,18.5V10.1H5.42v8.4H8.34Z" transform="translate(42, -2) scale(1.1)" />
        <!-- Twitter/X Vector Icon -->
        <path class="icon-btn" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" transform="translate(82, 0) scale(0.95)" />
        <!-- Portfolio Link Vector Icon -->
        <path class="icon-btn" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z" transform="translate(120, -1) scale(1.1)" />
      </g>

      <!-- Connection status display -->
      <g transform="translate(515, 20)">
        <circle cx="0" cy="0" r="4" fill="#10B981" filter="url(#subtleGlow)">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="12" y="4" class="txt-mono" font-size="11" class="txt-muted">SYSTEMS_SECURE</text>
      </g>
    </g>
  </g>
</svg>

